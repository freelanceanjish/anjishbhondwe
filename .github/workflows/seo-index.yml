name: Submit URLs to search engines

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub Pages deploy
        run: sleep 90

      - name: Regenerate Atom feed
        run: python3 scripts/generate_feed.py

      - name: Notify search engines (IndexNow + pings)
        run: python3 scripts/submit_to_search_engines.py

      - name: Google Search Console sitemap (API)
        env:
          GOOGLE_SEARCH_CONSOLE_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_JSON }}
        run: |
          pip install -q google-api-python-client google-auth
          python3 scripts/google_search_console_submit.py

      - name: Google Indexing API (priority URLs)
        env:
          GOOGLE_SEARCH_CONSOLE_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_JSON }}
        run: python3 scripts/google_indexing_api.py
